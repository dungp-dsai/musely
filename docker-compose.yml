# writer-app + PostgreSQL + per-user Hermes orchestrator
#
# First time:
#   cp .env.docker.example .env
#   # Set HERMES_API_SERVER_KEY (openssl rand -hex 32)
#   # Set SESSION_SECRET (openssl rand -hex 32)
#   # Set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (Google Cloud Console)
#
#   # 1. Build the shared Hermes base template (one-time LLM setup wizard).
#   #    Its /opt/data is persisted to ./hermes-base and cloned into each
#   #    user's volume by the orchestrator.
#   mkdir -p hermes-base
#   docker compose run --rm hermes-base-setup setup
#
#   # 2. Start the stack (postgres + api + web). Per-user Hermes containers
#   #    (hermes-user-<id>) are created on demand by the api orchestrator.
#   docker compose up -d --build
#
# Open http://localhost:8080 → sign in with Google

services:
  postgres:
    image: postgres:16-alpine
    container_name: writer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-writer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-writer}
      POSTGRES_DB: ${POSTGRES_DB:-writer}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - writer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-writer} -d ${POSTGRES_DB:-writer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: writer-app-api:latest
    container_name: writer-api
    restart: unless-stopped
    environment:
      PORT: 8081
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-writer}:${POSTGRES_PASSWORD:-writer}@postgres:5432/${POSTGRES_DB:-writer}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:8080/api/auth/google/callback}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WRITER_CHAT_MODEL: ${WRITER_CHAT_MODEL:-anthropic/claude-sonnet-4}
      HERMES_CHAT_MODEL: ${HERMES_CHAT_MODEL:-}
      HERMES_API_MODEL_NAME: ${HERMES_API_MODEL_NAME:-Hermes Agent}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      # ---- Per-user Hermes orchestrator ----
      HERMES_IMAGE: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
      HERMES_NETWORK: writer-net
      HERMES_BASE_DIR: /opt/hermes-base
      HERMES_DATA_DIR: /opt/hermes-data
      HERMES_IDLE_MINUTES: ${HERMES_IDLE_MINUTES:-15}
      HERMES_USER_MEMORY: ${HERMES_USER_MEMORY:-4g}
      HERMES_USER_CPUS: ${HERMES_USER_CPUS:-2.0}
    volumes:
      # Shared base template (read-only) cloned into each user volume on provision
      - ./hermes-base:/opt/hermes-base:ro
      # Configured Hermes home (incl. .env with LLM keys) — preferred seed source
      - ./hermes-data:/opt/hermes-data:ro
      # Docker socket: orchestrator creates/starts/stops per-user containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - writer-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: writer-app-web:latest
    container_name: writer-web
    restart: unless-stopped
    ports:
      - "${WRITER_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - writer-net

  # Template/setup helper only — NOT in the request path and NOT started by
  # `docker compose up` (guarded by the "setup" profile). Run the one-time
  # Hermes LLM setup wizard against the shared base template:
  #   docker compose run --rm hermes-base-setup setup
  hermes-base-setup:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    profiles: ["setup"]
    volumes:
      - ./hermes-base:/opt/data
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: ${f:-change-me-use-openssl-rand-hex-32}
      API_SERVER_MODEL_NAME: ${HERMES_API_MODEL_NAME:-Hermes Agent}
    shm_size: "1g"
    networks:
      - writer-net

networks:
  writer-net:
    name: writer-net
    driver: bridge

volumes:
  postgres-data:
