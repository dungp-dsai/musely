# writer-app + PostgreSQL + Hermes Agent
#
# First time:
#   cp .env.docker.example .env
#   # Set HERMES_API_SERVER_KEY (openssl rand -hex 32)
#   # Set SESSION_SECRET (openssl rand -hex 32)
#   # Set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (Google Cloud Console)
#
#   mkdir -p hermes-data
#   docker compose run --rm hermes-agent setup
#   docker compose up -d --build
#
# Open http://localhost:8080 → sign in with Google

services:
  postgres:
    image: postgres:16-alpine
    container_name: writer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-writer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-writer}
      POSTGRES_DB: ${POSTGRES_DB:-writer}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - writer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-writer} -d ${POSTGRES_DB:-writer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: writer-app-api:latest
    container_name: writer-api
    restart: unless-stopped
    environment:
      PORT: 8081
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-writer}:${POSTGRES_PASSWORD:-writer}@postgres:5432/${POSTGRES_DB:-writer}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:8080/api/auth/google/callback}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WRITER_CHAT_MODEL: ${WRITER_CHAT_MODEL:-anthropic/claude-sonnet-4}
      HERMES_API_BASE_URL: http://hermes-agent:8642/v1
      HERMES_API_SERVER_KEY: ${HERMES_API_SERVER_KEY:-change-me-use-openssl-rand-hex-32}
      HERMES_CHAT_MODEL: ${HERMES_CHAT_MODEL:-}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      AGENT_USER_ID: ${AGENT_USER_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      hermes-agent:
        condition: service_started
    networks:
      - writer-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: writer-app-web:latest
    container_name: writer-web
    restart: unless-stopped
    ports:
      - "${WRITER_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - writer-net

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "${HERMES_API_PORT:-8642}:8642"
    volumes:
      - ./hermes-data:/opt/data
      - ./server:/app/server:ro
      - ./AGENT_GUIDE.md:/app/AGENT_GUIDE.md:ro
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY:-change-me-use-openssl-rand-hex-32}
      API_SERVER_MODEL_NAME: ${HERMES_API_MODEL_NAME:-Hermes Agent}
      DATABASE_URL: postgresql://${POSTGRES_USER:-writer}:${POSTGRES_PASSWORD:-writer}@postgres:5432/${POSTGRES_DB:-writer}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      AGENT_USER_ID: ${AGENT_USER_ID:-}
    shm_size: "1g"
    deploy:
      resources:
        limits:
          memory: ${HERMES_MEMORY_LIMIT:-4G}
          cpus: "${HERMES_CPU_LIMIT:-2.0}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - writer-net

networks:
  writer-net:
    driver: bridge

volumes:
  postgres-data:
