name: Deploy — Production

on:
  # Trigger manually from GitHub Actions UI, or tag a release.
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel an in-flight prod deploy

jobs:
  deploy-backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Ensure Fly app exists
        run: ./scripts/fly-ensure-app.sh fly-prod/backend/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
          FLY_ORG: ${{ vars.FLY_ORG }}

      - name: Deploy backend
        run: ./scripts/fly-deploy.sh fly-prod/backend/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}

  deploy-agent:
    name: Agent image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Ensure Fly app exists
        run: ./scripts/fly-ensure-app.sh fly-prod/agent/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
          FLY_ORG: ${{ vars.FLY_ORG }}

      - name: Deploy agent image
        run: ./scripts/fly-deploy.sh fly-prod/agent/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}

  deploy-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Ensure Fly app exists
        run: ./scripts/fly-ensure-app.sh fly-prod/frontend/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
          FLY_ORG: ${{ vars.FLY_ORG }}

      - name: Deploy frontend
        run: ./scripts/fly-deploy.sh fly-prod/frontend/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
