# Musely frontend — staging
# Deploy from repo root:  ./scripts/fly-deploy.sh fly-staging/frontend/fly.toml
app = "musely-staging-frontend"
primary_region = "sin"

[build]
  dockerfile = "apps/frontend/Dockerfile"

[env]
  # nginx.conf.template substitutes ${BACKEND_URL} at container startup.
  # Using the internal Fly hostname keeps traffic inside Fly's private network.
  BACKEND_URL = "http://musely-staging-backend.internal:8081"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0   # scales to zero when idle

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
