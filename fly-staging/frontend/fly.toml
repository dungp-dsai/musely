# Musely frontend — staging
# Deploy from repo root:  ./scripts/fly-deploy.sh fly-staging/frontend/fly.toml
app = "musely-staging-frontend"
primary_region = "sin"

[build]
  dockerfile = "../../apps/frontend/Dockerfile"

[env]
  # Fly internal proxy (port 80) → backend internal_port 8081. Do NOT use :8081 here
  # (that hits the machine 6PN IP directly and gets connection refused).
  BACKEND_URL = "http://musely-staging-backend.internal"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0   # scales to zero when idle

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
