# Musely frontend — staging
# Deploy from repo root:  ./scripts/fly-deploy.sh fly-staging/frontend/fly.toml
app = "musely-staging-frontend"
primary_region = "sin"

[build]
  dockerfile = "../../apps/frontend/Dockerfile"

[env]
  # Route /api via Flycast (Fly Proxy on port 80). Requires: fly ips allocate-v6 --private -a musely-staging-backend
  BACKEND_URL = "http://musely-staging-backend.flycast"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0   # scales to zero when idle

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
