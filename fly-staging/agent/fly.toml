# Musely per-user Hermes agent — staging
# This Fly app hosts per-user machines created dynamically by the backend
# via the Fly Machines API.  The app itself has no long-lived machines;
# `fly deploy` here only builds and pushes the image to the Fly registry.
#
# Deploy from repo root:  fly deploy --config fly-staging/agent/fly.toml
app = "musely-staging-agent"
primary_region = "sin"

[build]
  dockerfile = "apps/agent/Dockerfile"

# Each dynamically-created user machine receives its own env at creation time
# (API_SERVER_KEY, AGENT_USER_ID, etc.) — see hermes-orchestrator.js.
# Any env vars shared across ALL user machines can go here so they are
# baked into the app's default process config.
[env]
  API_SERVER_HOST = "0.0.0.0"
  API_SERVER_PORT = "8642"

# Secrets: copy secrets.env.example → secrets.env, then:
#   ./scripts/fly-secrets-import.sh fly-staging/agent

# No [[mounts]] or [http_service] — each user machine has its own volume
# and is not exposed via Fly's HTTP routing (backend reaches it over 6PN).

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
