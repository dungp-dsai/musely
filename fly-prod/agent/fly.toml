# Musely per-user Hermes agent — production
# Deploy from repo root:  fly deploy --config fly-prod/agent/fly.toml
app = "musely-prod-agent"
primary_region = "sin"

[build]
  dockerfile = "apps/agent/Dockerfile"

[env]
  API_SERVER_HOST = "0.0.0.0"
  API_SERVER_PORT = "8642"

# Secrets set via `fly secrets set --config fly-prod/agent/fly.toml`:
#   AGENT_API_KEY

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
