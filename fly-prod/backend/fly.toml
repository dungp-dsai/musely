# Musely backend — production
# Deploy from repo root:  ./scripts/fly-deploy.sh fly-prod/backend/fly.toml
app = "musely-prod-backend"
primary_region = "sin"

[build]
  dockerfile = "../../apps/backend/Dockerfile"

[env]
  NODE_ENV          = "production"
  PORT              = "8081"
  HOST              = "0.0.0.0"
  DB_PATH           = "/data/musely.db"
  FLY_AGENT_APP     = "musely-prod-agent"
  FLY_AGENT_IMAGE   = "registry.fly.io/musely-prod-agent:latest"
  FLY_AGENT_REGION  = "sin"
  FLY_API_HOSTNAME  = "api.machines.dev"
  MUSELY_AGENT_IDLE_MINUTES = "30"
  MUSELY_AGENT_USER_MEMORY_MB = "2048"
  MUSELY_AGENT_USER_CPUS  = "1"

# Secrets: copy fly-prod/backend/secrets.env.example → secrets.env, then import.

# Create volume once:
#   fly volumes create musely_data --region sin --size 5 --config fly-prod/backend/fly.toml
[[mounts]]
  source      = "musely_data"
  destination = "/data"

[http_service]
  internal_port        = 8081
  force_https          = false   # flycast is HTTP-only; frontend terminates TLS
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
