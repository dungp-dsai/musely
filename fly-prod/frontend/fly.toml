# Musely frontend — production
# Deploy from repo root:  ./scripts/fly-deploy.sh fly-prod/frontend/fly.toml
app = "musely-prod-frontend"
primary_region = "sin"

[build]
  dockerfile = "../../apps/frontend/Dockerfile"

[env]
  # Fly internal proxy on port 80 — do not append :8081 (see fly-staging/frontend/fly.toml).
  BACKEND_URL = "http://musely-prod-backend.internal"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
